<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Military RP Loading</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="map-bg" class="map-background"></div>
    <div class="overlay"></div>
    <div class="scanlines"></div>

    <div class="main-container">
        <!-- Логотип -->
        <div id="logo-container" class="logo-wrapper">
            <img id="logo" src="ft.png" alt="Logo">
            <div class="logo-glow"></div>
        </div>

        <!-- Информация о сервере -->
        <div class="server-info">
            <h1 id="servername">MILITARY OPERATIONS</h1>
            <p id="mapname">INITIALIZING...</p>
        </div>

        <!-- Прогресс бар -->
        <div class="progress-section">
            <div class="status-container">
                <span id="status">Загрузка ресурсов...</span>
                <span id="percent">0%</span>
            </div>
            <div class="progress-bg">
                <div id="progress-bar" class="progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- QR Код Discord -->
    <div class="qr-container">
        <p>НАШИ DISCORD СЕРВЕРА</p>
        <img src="qr-code.png" alt="Discord QR Code">
    </div>

    <!-- Музыкальный плеер -->
    <!-- Пользователь закинет свою музыку сюда, пока ставим заглушку -->
    <audio id="loading-music"></audio>

    <script src="script.js"></script>
</body>
</html>
